<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>5C 卓越旅程</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#0f2a4a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="卓越旅程">
<link rel="stylesheet" href="style.css">
<script src="vendor/chart.umd.min.js"></script>
</head>
<body>
<header class="topbar">
  <div class="brand">Ralph Lauren｜<span data-i18n="brand_title"></span></div>
  <div class="topbar-right">
    <nav class="tabs">
      <button class="tab-btn active" data-view="score" data-i18n="tab_score"></button>
      <button class="tab-btn" data-view="history" data-i18n="tab_history"></button>
      <button class="tab-btn" data-view="analytics" data-i18n="tab_analytics"></button>
    </nav>
    <div class="lang-switcher">
      <button type="button" id="btn-lang" class="lang-btn" aria-label="Language">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="9"></circle>
          <ellipse cx="12" cy="12" rx="4" ry="9"></ellipse>
          <line x1="3" y1="12" x2="21" y2="12"></line>
        </svg>
      </button>
      <div id="lang-menu" class="lang-menu" hidden></div>
    </div>
  </div>
</header>

<main>

<!-- ==================== 打分 ==================== -->
<section id="view-score" class="view active">
  <form id="score-form">
    <div class="card">
      <div class="grid-fields">
        <label><span data-i18n="field_date"></span>
          <input type="date" id="f-date" required>
        </label>
        <label><span data-i18n="field_store"></span>
          <div class="inline-add">
            <select id="f-store" required></select>
            <button type="button" id="btn-add-store" class="btn-ghost" data-i18n="btn_add_store"></button>
          </div>
          <div class="inline-add" id="new-store-row" hidden>
            <input type="text" id="new-store-name" data-i18n-placeholder="placeholder_new_store">
            <button type="button" id="btn-confirm-store" class="btn-ghost" data-i18n="btn_confirm_store"></button>
            <button type="button" id="btn-cancel-store" class="btn-ghost" data-i18n="btn_cancel_store"></button>
          </div>
        </label>
        <label><span data-i18n="field_employee"></span>
          <input type="text" id="f-employee" list="employee-list" required data-i18n-placeholder="placeholder_employee">
          <datalist id="employee-list"></datalist>
        </label>
        <label><span data-i18n="field_evaluator"></span>
          <input type="text" id="f-evaluator" list="evaluator-list" required data-i18n-placeholder="placeholder_evaluator">
          <datalist id="evaluator-list"></datalist>
        </label>
      </div>

      <div class="feelings">
        <div class="feelings-label" data-i18n="feelings_label"></div>
        <div id="feelings-options" class="feelings-options"></div>
      </div>
    </div>

    <div id="categories-container"></div>

    <div class="card overall-feedback">
      <label><span data-i18n="field_overall_feedback"></span>
        <textarea id="f-overall-feedback" rows="3" data-i18n-placeholder="placeholder_overall_feedback"></textarea>
      </label>
    </div>

    <div id="submit-msg" class="submit-msg"></div>
  </form>
</section>

<!-- ==================== 歷史記錄 ==================== -->
<section id="view-history" class="view">
  <div class="card filters">
    <label><span data-i18n="field_store"></span>
      <select id="h-store"><option value="" data-i18n="filter_store_all"></option></select>
    </label>
    <label><span data-i18n="filter_employee"></span>
      <select id="h-employee"><option value="" data-i18n="filter_employee_all"></option></select>
    </label>
    <label><span data-i18n="filter_date_from"></span> <input type="date" id="h-date-from"></label>
    <label><span data-i18n="filter_date_to"></span> <input type="date" id="h-date-to"></label>
    <button type="button" id="btn-filter-history" class="btn-primary" data-i18n="btn_filter"></button>
  </div>
  <div class="card">
    <table class="data-table" id="history-table">
      <thead>
        <tr>
          <th data-i18n="th_date"></th><th data-i18n="th_store"></th><th data-i18n="th_employee"></th>
          <th data-i18n="th_evaluator"></th><th data-i18n="th_total"></th><th data-i18n="th_grade"></th><th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div id="history-detail" class="card detail-panel" hidden></div>
</section>

<!-- ==================== 資料分析 ==================== -->
<section id="view-analytics" class="view">
  <div class="card filters">
    <label><span data-i18n="filter_store_range"></span>
      <select id="a-store"><option value="" data-i18n="filter_store_range_all"></option></select>
    </label>
    <button type="button" id="btn-refresh-analytics" class="btn-primary" data-i18n="btn_refresh_analytics"></button>
  </div>

  <div class="highlight-cards">
    <div class="card highlight-card highlight-good">
      <div class="highlight-label" data-i18n="highlight_best_label"></div>
      <div class="highlight-value" id="highlight-best">－</div>
    </div>
    <div class="card highlight-card highlight-focus">
      <div class="highlight-label" data-i18n="highlight_worst_label"></div>
      <div class="highlight-value" id="highlight-worst">－</div>
    </div>
  </div>

  <div class="analytics-grid">
    <div class="card">
      <h3 data-i18n="chart_category_title"></h3>
      <div class="chart-wrap"><canvas id="chart-category"></canvas></div>
      <p class="hint" data-i18n="chart_category_hint"></p>
    </div>
    <div class="stacked-cards">
      <div class="card">
        <h3 data-i18n="strong_items_title"></h3>
        <table class="data-table small" id="strong-items-table">
          <thead><tr><th data-i18n="th_category"></th><th data-i18n="th_item"></th><th data-i18n="th_pct"></th><th data-i18n="th_n"></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="card">
        <h3 data-i18n="weak_items_title"></h3>
        <table class="data-table small" id="weak-items-table">
          <thead><tr><th data-i18n="th_category"></th><th data-i18n="th_item"></th><th data-i18n="th_pct"></th><th data-i18n="th_n"></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card">
    <h3 data-i18n="employee_trend_title"></h3>
    <label><span data-i18n="field_select_employee"></span>
      <select id="a-employee"><option value="" data-i18n="select_employee_placeholder"></option></select>
    </label>
    <div class="chart-wrap"><canvas id="chart-employee-trend"></canvas></div>
    <table class="data-table small" id="employee-trend-table">
      <thead>
        <tr>
          <th data-i18n="th_date"></th><th data-i18n="th_total"></th><th data-i18n="th_grade"></th>
          <th>CREATE</th><th>CONNECT</th><th>CONVERT</th><th>CONFIRM</th><th>CONTINUE</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
